<!DOCTYPE html>
<html>

<head>

<title>Cortex AI Agent</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:100px;
}

input{
width:400px;
padding:12px;
font-size:18px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
font-size:18px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin-left:10px;
}

#result{
margin-top:40px;
max-width:700px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

</style>

</head>

<body>

<h1>Cortex AI Agent</h1>

<input id="query" placeholder="Ask anything">

<button onclick="ask()">Ask</button>

<div id="result"></div>

<script>

async function ask(){

let q=document.getElementById("query").value

document.getElementById("result").innerHTML="Searching..."

let res=await fetch("http://127.0.0.1:8000/ask",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
task:q
})

})

let data=await res.json()

let html=""

if(data.result && data.result.length>0){

data.result.forEach(r=>{
html += "<p>• "+r+"</p>"
})

}else{

html="No results found"

}

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
