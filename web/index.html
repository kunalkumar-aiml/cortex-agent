<!DOCTYPE html>
<html>

<head>

<title>Cortex AI Agent</title>

<style>

body{
background: radial-gradient(circle,#0f2027,#203a43,#2c5364);
color:white;
font-family:Arial;
text-align:center;
margin-top:100px;
}

input{
width:400px;
padding:10px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
background:#00f2ff;
border:none;
cursor:pointer;
}

#result{
margin-top:40px;
font-size:18px;
}

</style>

</head>


<body>

<h1>Cortex AI Agent</h1>

<input id="query" placeholder="Ask anything">

<button onclick="ask()">Ask</button>

<div id="result"></div>


<script>

async function ask(){

let q = document.getElementById("query").value

let res = await fetch("http://127.0.0.1:8000/ask",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
task:q
})

})

let data = await res.json()

let html=""

data.result.forEach(r=>{
html += "<p>"+r.name+"</p>"
})

document.getElementById("result").innerHTML=html

}

</script>


</body>
</html>
