<!DOCTYPE html>
<html>

<head>

<title>Cortex AI Agent</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:80px;
}

input{
width:420px;
padding:14px;
font-size:18px;
border-radius:8px;
border:none;
}

button{
padding:14px 24px;
font-size:18px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin-left:10px;
}

#result{
margin-top:40px;
max-width:800px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

</style>

</head>

<body>

<h1>Cortex AI Agent</h1>

<input id="query" placeholder="Ask anything">

<button onclick="ask()">Ask</button>

<div id="result"></div>

<script>

async function ask(){

let q=document.getElementById("query").value

document.getElementById("result").innerHTML="Searching..."

let res=await fetch("http://127.0.0.1:8000/ask",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
task:q
})

})

let data=await res.json()

let html=""

data.result.forEach(laptop=>{

html+=`

<div class="card">

<h2>${laptop.rank}. ${laptop.name}</h2>

<p><b>CPU:</b> ${laptop.cpu}</p>

<p><b>GPU:</b> ${laptop.gpu}</p>

<p><b>RAM:</b> ${laptop.ram}</p>

<p><b>Storage:</b> ${laptop.storage}</p>

<p><b>Display:</b> ${laptop.display}</p>

<p><b>Why Best:</b> ${laptop.reason}</p>

</div>

`

})

document.getElementById("result").innerHTML=html

}

</script>

</body>

</html>
